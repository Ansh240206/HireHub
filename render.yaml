services:
  # 1. Backend Web Service
  - type: web
    name: hirehub-api
    runtime: docker
    dockerfilePath: hirehub-backend/Dockerfile
    dockerContext: hirehub-backend
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        value: postgres
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION_MS
        value: "604800000"

  # 2. Frontend Web Service
  - type: web
    name: hirehub-frontend
    runtime: docker
    dockerfilePath: hirehub-app/Dockerfile
    dockerContext: hirehub-app
    plan: free
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: hirehub-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NGINX_ENVSUBST_FILTER
        value: "BACKEND_URL"

databases:
  # 3. Managed PostgreSQL Database
  - name: hirehub-db
    databaseName: hirehub
    user: hirehub
    plan: free
