services:
  # 1. Backend Web Service
  - type: web
    name: hirehub-api
    runtime: docker
    dockerfilePath: hirehub-backend/Dockerfile
    dockerContext: hirehub-backend
    plan: free
    envVars:
      - key: DB_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}
      - key: DB_USERNAME
        fromDatabase:
          name: hirehub-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hirehub-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: hirehub-db
          property: host
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromDatabase:
          name: hirehub-db
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION_MS
        value: "604800000"

  # 2. Frontend Web Service
  - type: web
    name: hirehub-frontend
    runtime: docker
    dockerfilePath: hirehub-app/Dockerfile
    dockerContext: hirehub-app
    plan: free
    envVars:
      - key: BACKEND_URL
        value: http://hirehub-api:8080
      - key: NGINX_ENVSUBST_FILTER
        value: "BACKEND_URL"

databases:
  # 3. Managed PostgreSQL Database
  - name: hirehub-db
    databaseName: hirehub
    user: hirehub
    plan: free
