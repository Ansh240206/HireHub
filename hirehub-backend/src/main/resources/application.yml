spring:
  application:
    name: hirehub-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/HireHub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-minimum-256-bit-production-key}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  files:
    resume-dir: ${RESUME_DIR:uploads/resumes}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
